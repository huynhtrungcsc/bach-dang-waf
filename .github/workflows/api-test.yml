# ============================================================
#  Bach Dang WAF — API CI
#  Runs on every push/PR touching apps/api or the lockfile.
#  PostgreSQL 16 is spun up as a service container.
# ============================================================

name: API — Test & Coverage

on:
  push:
    branches: [main, develop, beta_developer]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-test.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main, develop, beta_developer]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-test.yml"
      - "pnpm-lock.yaml"

jobs:
  api-test:
    name: Test (Node 20 · PostgreSQL 16)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: waf_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d waf_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm 8.15.0
        uses: pnpm/action-setup@v4
        with:
          version: "8.15.0"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Apply database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/waf_ci?schema=public
        run: pnpm exec prisma migrate deploy

      - name: Run tests with coverage
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/waf_ci?schema=public
          NODE_ENV: test
          PORT: 3001
          JWT_ACCESS_SECRET: ci-access-secret-not-for-production
          JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          SESSION_SECRET: ci-session-secret-not-for-production
          CORS_ORIGIN: "http://localhost:5000,http://localhost:3000"
          BCRYPT_ROUNDS: 4
          TOTP_ISSUER: Bach Dang WAF CI
          SSL_STORE_DIR: ./tmp-ssl
          ACME_WEBROOT: ./tmp-acme
        run: pnpm test:coverage

      - name: Publish coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: apps/api
