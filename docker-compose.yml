# ============================================================
#  Bach Dang WAF — Full Stack Compose
#  Services: database · api · web
#  Usage:
#    docker compose up -d          # start all
#    docker compose up -d database # database only
#    docker compose logs -f api    # tail api logs
# ============================================================

x-api-env: &api-env
  DATABASE_URL: "postgresql://${WAF_DB_USER:-waf_user}:${WAF_DB_PASS:-change_before_deploy}@localhost:${WAF_DB_PORT:-5432}/${WAF_DB_NAME:-bach_dang_waf}?schema=public"
  PORT: ${WAF_API_PORT:-3001}
  NODE_ENV: ${WAF_NODE_ENV:-production}
  JWT_ACCESS_SECRET: ${WAF_JWT_ACCESS_SECRET:-replace-this-secret-in-production}
  JWT_REFRESH_SECRET: ${WAF_JWT_REFRESH_SECRET:-replace-this-secret-in-production}
  JWT_ACCESS_EXPIRES_IN: ${WAF_JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${WAF_JWT_REFRESH_EXPIRES_IN:-7d}
  SESSION_SECRET: ${WAF_SESSION_SECRET:-replace-this-secret-in-production}
  CORS_ORIGIN: ${WAF_CORS_ORIGIN:-http://localhost:8080,http://localhost:5000}
  BCRYPT_ROUNDS: ${WAF_BCRYPT_ROUNDS:-12}
  TOTP_ISSUER: ${WAF_TOTP_ISSUER:-Bach Dang WAF}
  SSL_STORE_DIR: ${WAF_SSL_STORE_DIR:-/etc/nginx/ssl}
  ACME_WEBROOT: ${WAF_ACME_WEBROOT:-/var/www/html/.well-known/acme-challenge}
  SMTP_HOST: ${WAF_SMTP_HOST:-smtp.example.com}
  SMTP_PORT: ${WAF_SMTP_PORT:-587}
  SMTP_USER: ${WAF_SMTP_USER:-alerts@example.com}
  SMTP_PASS: ${WAF_SMTP_PASS:-replace-before-use}

x-healthcheck-wget: &wget-health
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:

  # ----------------------------------------------------------
  # Database — PostgreSQL 16
  # ----------------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: waf-database
    hostname: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WAF_DB_NAME:-bach_dang_waf}
      POSTGRES_USER: ${WAF_DB_USER:-waf_user}
      POSTGRES_PASSWORD: ${WAF_DB_PASS:-change_before_deploy}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:${WAF_DB_PORT:-5432}:5432"
    volumes:
      - waf_pg_data:/var/lib/postgresql/data
      - ./docker/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - waf-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAF_DB_USER:-waf_user} -d ${WAF_DB_NAME:-bach_dang_waf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # API — Node.js / Express + Nginx + ModSecurity
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: waf-api
    hostname: api
    restart: unless-stopped
    network_mode: host
    environment:
      <<: *api-env
    volumes:
      - waf_backups:/var/backups
      - waf_nginx_modules:/usr/lib/nginx
      - waf_nginx_conf:/etc/nginx
      - waf_nginx_logs:/var/log/nginx
      - waf_acme:/var/www/html/.well-known/acme-challenge
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      <<: *wget-health

  # ----------------------------------------------------------
  # Web — React SPA served by Nginx
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: waf-web
    hostname: web
    restart: unless-stopped
    network_mode: host
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ----------------------------------------------------------
# Named volumes
# ----------------------------------------------------------
volumes:
  waf_pg_data:
    driver: local
  waf_backups:
    driver: local
  waf_nginx_conf:
    driver: local
  waf_nginx_logs:
    driver: local
  waf_nginx_modules:
    driver: local
  waf_acme:
    driver: local

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  waf-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
