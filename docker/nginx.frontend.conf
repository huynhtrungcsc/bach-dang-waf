# ============================================================
#  Bach Dang WAF — Web UI container nginx config
#  Serves the React SPA and proxies /api/* to the
#  API backend running on localhost:3001.
# ============================================================

server {
    listen      8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ----------------------------------------------------------
    # Compression
    # ----------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/wasm
        text/xml
        application/xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Static assets — long-lived cache
    # ----------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        try_files         $uri =404;
        access_log        off;
    }

    # ----------------------------------------------------------
    # API proxy
    # Overrides Origin so CORS always resolves to localhost:8080,
    # regardless of the IP/hostname used by the browser.
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass            http://127.0.0.1:3001/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              localhost;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Origin            http://localhost:8080;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 64k;
    }

    # ----------------------------------------------------------
    # Health probe (Docker HEALTHCHECK)
    # ----------------------------------------------------------
    location = /healthz {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }

    # ----------------------------------------------------------
    # SPA fallback — all routes render index.html
    # ----------------------------------------------------------
    location / {
        try_files   $uri $uri/ /index.html;
        add_header  Cache-Control "no-cache, no-store, must-revalidate";
    }
}
